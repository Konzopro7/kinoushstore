name: Deploy to Hostinger

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Hostinger via SSH
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate deployment configuration
        env:
          HOSTINGER_SSH_USER: ${{ secrets.HOSTINGER_SSH_USER }}
          HOSTINGER_SSH_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          HOSTINGER_SSH_PORT: ${{ secrets.HOSTINGER_SSH_PORT }}
          HOSTINGER_PROJECT_PATH: ${{ secrets.HOSTINGER_PROJECT_PATH }}
        run: |
          set -e
          test -n "$HOSTINGER_SSH_USER" || { echo "HOSTINGER_SSH_USER is missing"; exit 1; }
          test -n "$HOSTINGER_SSH_HOST" || { echo "HOSTINGER_SSH_HOST is missing"; exit 1; }
          test -n "$HOSTINGER_SSH_PORT" || { echo "HOSTINGER_SSH_PORT is missing"; exit 1; }
          test -n "$HOSTINGER_PROJECT_PATH" || { echo "HOSTINGER_PROJECT_PATH is missing"; exit 1; }

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}

      - name: Deploy to Hostinger server
        env:
          HOSTINGER_SSH_USER: ${{ secrets.HOSTINGER_SSH_USER }}
          HOSTINGER_SSH_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          HOSTINGER_SSH_PORT: ${{ secrets.HOSTINGER_SSH_PORT }}
          HOSTINGER_PROJECT_PATH: ${{ secrets.HOSTINGER_PROJECT_PATH }}
        run: |
          set -e
          echo "Deploying to Hostinger server $HOSTINGER_SSH_HOST"
          printf -v remote_path '%q' "$HOSTINGER_PROJECT_PATH"
          ssh -4 -o BatchMode=yes -o ConnectTimeout=20 -o StrictHostKeyChecking=no \
            -p "$HOSTINGER_SSH_PORT" \
            "$HOSTINGER_SSH_USER@$HOSTINGER_SSH_HOST" \
            "cd $remote_path && git fetch origin main && git checkout main && git reset --hard origin/main && git clean -fd && bash deploy.sh production"
